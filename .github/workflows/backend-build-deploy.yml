name: Backend Build Deploy

on:
  workflow_call:
    inputs:
      version:
        type: string
        required: true
      ocptoken:
        type: string
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "=== BE BUILD ==="
          echo "Version: ${{ inputs.version }}"

  docker:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - run: echo "Building Docker image..."

  deploy:
    needs: docker
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "Deploying backend..."
          echo "Token: ${{ inputs.ocptoken }}"

  restart:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - run: echo "Restarting pods..."
